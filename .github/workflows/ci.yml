name: ci

on:
  push:
    branches: [master]
  pull_request:

# v0.1.6 P2-5: principle-of-least-privilege. Workflow only reads source +
# runs tests; no GITHUB_TOKEN write needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .[dev]
      - run: pytest -q
      - name: Install Sentinel
        # v0.1.4 P1-27: pin to explicit commit. Bump intentionally rather than
        # silently absorbing upstream changes between CI runs.
        run: pip install git+https://github.com/mahmood726-cyber/sentinel.git@e3eb4f09ed0ac73d85388816992130a35bdfad16
      - name: Sentinel scan (fail on BLOCK)
        run: python -m sentinel scan --repo .
